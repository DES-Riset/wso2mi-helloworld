# Standalone Docker Compose for BelajarWso2 Application
services:
  micro-integrator:
    image: ${MI_IMAGE:-belajarwso2:1.0.0}
    container_name: belajar-micro-integrator
    restart: unless-stopped
    ports:
      - "${MI_PORT:-8291}:8290"
      - "${MI_HTTPS_PORT:-8254}:8253"
    environment:
      - TZ=Asia/Jakarta
      - JVM_MEM_OPTS=${MI_JAVA_OPTS:--Xms512m -Xmx1024m}
    healthcheck:
      # WSO2 MI Management API berjalan di port 9164 via HTTP (bukan HTTPS)
      # Endpoint /health tersedia mulai WSO2 MI 4.x (bukan /healthz)
      test: ["CMD-SHELL", "curl -sf http://localhost:9164/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    labels:
      - "com.belajarwso2.service=micro-integrator"
      - "com.belajarwso2.version=${MI_IMAGE:-belajarwso2:1.0.0}"
